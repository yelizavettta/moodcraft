<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MoodCraft</title>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <link rel="stylesheet" href="style.css" />

    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>

  <body>
    <div class="app">
      <header class="header">
        <h1>MoodCraft</h1>
        <div class="streak">🔥 <span id="streak">0</span></div>
      </header>

      <section class="card">
        <h2 id="greeting">Привет!</h2>
        <p id="date"></p>
      </section>

      <section class="card">
        <h3>Твоё настроение</h3>

        <div class="moods">
          <button class="mood" data-mood="1">😔</button>
          <button class="mood" data-mood="2">😐</button>
          <button class="mood" data-mood="3">🙂</button>
          <button class="mood" data-mood="4">😁</button>
        </div>
      </section>

      <section class="card">
        <div class="habits-header">
          <h3>Привычки</h3>
          <button id="addHabit">+</button>
        </div>

        <ul id="habitList"></ul>
      </section>

      <section class="card">
        <h3>Дневник</h3>

        <textarea id="noteInput" placeholder="Как прошёл день?"></textarea>

        <button id="saveNote">Сохранить</button>

        <div id="notes"></div>
      </section>
    </div>

    <script src="script.js"></script>
  </body>
</html>
